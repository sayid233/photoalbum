<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="个人摄影作品展示网站">
  <title>Lin Zhao Photography</title>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="home">
  <div class="cursor-glow" aria-hidden="true"></div>
  <header class="site-header">
    <a class="brand" href="./index.html" aria-label="返回首页">
      <span class="brand-mark"></span>
      <span data-profile="name">Lin Zhao</span>
    </a>
    <nav aria-label="主导航">
      <a href="./works.html">作品</a>
      <a href="./journal.html">手记</a>
      <a href="./contact.html">联系</a>
      <a href="./admin.html">后台</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero" data-parallax>
      <img data-profile-image="heroImage" src="" alt="摄影作品首图">
      <div class="hero-copy">
        <p class="eyebrow">Editorial / Travel / Portrait</p>
        <h1 data-profile="heroTitle"></h1>
        <div class="hero-actions">
          <a class="btn primary" href="./works.html">全部作品</a>
          <a class="btn ghost" href="./contact.html">预约拍摄</a>
        </div>
      </div>
      <div class="hero-strip" aria-label="精选数据">
        <span><strong data-stat="works">0</strong> 组作品</span>
        <span><strong data-stat="categories">0</strong> 个分类</span>
        <span><strong data-stat="notes">0</strong> 篇手记</span>
      </div>
    </section>

    <section class="intro" aria-label="摄影师简介">
      <p data-profile="intro"></p>
      <div class="signal-line" aria-hidden="true"></div>
    </section>

    <section class="work">
      <div class="section-head">
        <div>
          <p class="eyebrow">Selected Frames</p>
          <h2>精选作品</h2>
        </div>
        <a class="text-link" href="./works.html">查看全部</a>
      </div>
      <div class="gallery" data-gallery="featured" aria-live="polite"></div>
    </section>

    <section class="journal">
      <div class="section-head">
        <div>
          <p class="eyebrow">Field Notes</p>
          <h2>拍摄手记</h2>
        </div>
        <a class="text-link" href="./journal.html">全部手记</a>
      </div>
      <div class="note-track" data-notes="featured"></div>
    </section>
  </main>

  <footer id="contact">
    <div>
      <p class="eyebrow">Booking</p>
      <h2>一起完成下一组照片。</h2>
    </div>
    <a class="contact-link" data-contact="email" href="mailto:hello@example.com">hello@example.com</a>
  </footer>

  <dialog class="lightbox" aria-label="作品预览">
    <button class="close" type="button" aria-label="关闭预览">x</button>
    <img alt="">
    <div class="lightbox-caption">
      <strong></strong>
      <span></span>
    </div>
  </dialog>

  <script src="./data/site-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
